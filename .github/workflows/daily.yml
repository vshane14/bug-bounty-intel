name: Daily Bug Bounty Intel

on:
  schedule:
    # Runs every day at 08:00 UTC (09:00 London BST / 08:00 GMT)
    - cron: "0 8 * * *"

  # Lets you trigger a manual run from the GitHub Actions tab
  workflow_dispatch:

jobs:
  collect-analyse-notify:
    runs-on: ubuntu-latest

    # Give the job permission to write back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Collect data
        run: python collector.py

      - name: Analyse trends
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python analyse.py

      - name: Send notification
        env:
          NOTIFY_EMAIL:         ${{ secrets.NOTIFY_EMAIL }}
          NOTIFY_FROM_EMAIL:    ${{ secrets.NOTIFY_FROM_EMAIL }}
          NOTIFY_PASSWORD:      ${{ secrets.NOTIFY_PASSWORD }}
        run: python notify.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/analysis.json
          git diff --staged --quiet || git commit -m "chore: daily data update $(date -u +%Y-%m-%d)"
          git push
